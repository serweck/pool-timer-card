blueprint:
  name: TEST - Pool logic (diagnostic)
  description: >
    Diagnostic version of the real blueprint. Computes the same variables, then
    posts a notification showing the result BEFORE touching the switch. Lets us see
    whether the variables render and what 'desired' is - without any switch call
    that could hang.
  domain: automation
  source_url: https://github.com/serweck/pool-timer-card/blob/main/blueprints/_test_logic.yaml
  input:
    pump_switch:
      name: Pump switch
      selector:
        entity:
          filter:
            - domain: switch
    schedule_helper:
      name: Schedule helper
      selector:
        entity:
          filter:
            - domain: input_text
    mode_helper:
      name: Mode helper
      selector:
        entity:
          filter:
            - domain: input_select
    state_helper:
      name: State helper
      selector:
        entity:
          filter:
            - domain: input_text

mode: restart

trigger:
  - platform: time_pattern
    minutes: /1

variables:
  pump: !input pump_switch
  sched_e: !input schedule_helper
  mode_e: !input mode_helper
  state_e: !input state_helper
  raw: "{{ states(state_e) }}"
  st: "{{ raw | from_json if raw.startswith('{') else {} }}"
  act: "{{ st.action if 'action' in st else none }}"
  until: "{{ st.until | int(0) }}"
  after: "{{ st.after if 'after' in st else 'Auto' }}"
  mode: "{{ states(mode_e) }}"
  sched: "{{ states(sched_e) }}"
  idx: "{{ now().hour * 2 + (1 if now().minute >= 30 else 0) }}"
  now_ms: "{{ (now().timestamp() * 1000) | int }}"
  running: "{{ (act is number) and (now_ms < until) }}"
  expired: "{{ (act is number) and (now_ms >= until) }}"
  to_settling: "{{ expired and after == 'OFF' }}"
  settling: "{{ act == 'settling' or to_settling }}"
  desired: >
    {% if running %}on
    {% elif settling %}off
    {% elif mode == 'Perm' %}on
    {% elif mode == 'OFF' %}off
    {% elif sched | length == 48 %}{{ 'on' if sched[idx] == '1' else 'off' }}
    {% else %}off{% endif %}

action:
  # Step A: prove the action runs and the variables rendered.
  - service: persistent_notification.create
    data:
      notification_id: pool_logic_test
      title: Pool logic test
      message: >
        {{ now().strftime('%H:%M:%S') }} | desired={{ desired | trim }} |
        mode={{ mode }} | act={{ act }} | sched_len={{ sched | length }} |
        idx={{ idx }} | pump_now={{ states(pump) }}
  # Step B: now try the switch (if this hangs, we'll see Step A fired but pump won't change).
  - choose:
      - conditions: "{{ desired | trim == 'on' and not is_state(pump, 'on') }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input pump_switch
      - conditions: "{{ desired | trim == 'off' and not is_state(pump, 'off') }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input pump_switch
