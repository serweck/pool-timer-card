<svg viewBox="0 0 500 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="500" height="650" fill="#1C1C1E"/>

  <!-- Card container -->
  <rect x="30" y="20" width="440" height="610" rx="12" fill="#2C2C2E" stroke="#3A3A3C" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="50" font-size="24" font-weight="bold" fill="#E5E5E7" text-anchor="middle">Pool Timer</text>

  <!-- Dial circle -->
  <circle cx="250" cy="220" r="140" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="2"/>

  <!-- Hour markers (simplified) -->
  <g stroke="#2C2C2E" stroke-width="2">
    <!-- 12 o'clock -->
    <line x1="250" y1="85" x2="250" y2="100"/>
    <!-- 3 o'clock -->
    <line x1="385" y1="220" x2="370" y2="220"/>
    <!-- 6 o'clock -->
    <line x1="250" y1="355" x2="250" y2="340"/>
    <!-- 9 o'clock -->
    <line x1="115" y1="220" x2="130" y2="220"/>
  </g>

  <!-- Hour numbers -->
  <text x="250" y="105" font-size="14" fill="#8E8E93" text-anchor="middle">24</text>
  <text x="365" y="228" font-size="14" fill="#8E8E93" text-anchor="start">6</text>
  <text x="250" y="345" font-size="14" fill="#8E8E93" text-anchor="middle">12</text>
  <text x="120" y="228" font-size="14" fill="#8E8E93" text-anchor="end">18</text>

  <!-- Segments (simplified arc segments) -->
  <path d="M 250 85 A 140 140 0 0 1 310 95" fill="none" stroke="#4A90D9" stroke-width="20" stroke-linecap="round"/>
  <path d="M 315 105 A 140 140 0 0 1 360 155" fill="none" stroke="#4A90D9" stroke-width="20" stroke-linecap="round"/>
  <path d="M 365 170 A 140 140 0 0 1 380 220" fill="none" stroke="#1A3A5C" stroke-width="20" stroke-linecap="round"/>
  <path d="M 375 250 A 140 140 0 0 1 360 295" fill="none" stroke="#1A3A5C" stroke-width="20" stroke-linecap="round"/>
  <path d="M 340 325 A 140 140 0 0 1 250 355" fill="none" stroke="#1A3A5C" stroke-width="20" stroke-linecap="round"/>
  <path d="M 230 355 A 140 140 0 0 1 140 325" fill="none" stroke="#4A90D9" stroke-width="20" stroke-linecap="round"/>
  <path d="M 120 295 A 140 140 0 0 1 105 220" fill="none" stroke="#4A90D9" stroke-width="20" stroke-linecap="round"/>
  <path d="M 115 170 A 140 140 0 0 1 155 105" fill="none" stroke="#1A3A5C" stroke-width="20" stroke-linecap="round"/>

  <!-- Center knob -->
  <circle cx="250" cy="220" r="35" fill="#3A3A3C" stroke="#5A5A5C" stroke-width="2"/>
  <circle cx="250" cy="220" r="28" fill="#2C2C2E"/>

  <!-- Needle (red) -->
  <line x1="250" y1="220" x2="250" y2="95" stroke="#FF3B30" stroke-width="3" stroke-linecap="round"/>
  <circle cx="250" cy="220" r="5" fill="#FF3B30"/>

  <!-- Current time display -->
  <text x="250" y="380" font-size="16" font-weight="bold" fill="#E5E5E7" text-anchor="middle">Auto</text>

  <!-- Mode selector -->
  <g>
    <text x="250" y="420" font-size="12" fill="#8E8E93" text-anchor="middle">Mode:</text>

    <!-- Mode buttons -->
    <rect x="140" y="430" width="55" height="30" rx="6" fill="#4A90D9" stroke="#5BA0E9" stroke-width="1.5"/>
    <text x="167.5" y="450" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Auto</text>

    <rect x="210" y="430" width="55" height="30" rx="6" fill="#3A3A3C" stroke="#3A3A3C" stroke-width="1.5"/>
    <text x="237.5" y="450" font-size="12" font-weight="bold" fill="#8E8E93" text-anchor="middle">Perm</text>

    <rect x="280" y="430" width="55" height="30" rx="6" fill="#3A3A3C" stroke="#3A3A3C" stroke-width="1.5"/>
    <text x="307.5" y="450" font-size="12" font-weight="bold" fill="#8E8E93" text-anchor="middle">OFF</text>
  </g>

  <!-- Presets section -->
  <text x="50" y="490" font-size="11" fill="#8E8E93">Presets:</text>
  <rect x="50" y="500" width="180" height="28" rx="6" fill="#3A3A3C" stroke="#3A3A3C" stroke-width="1.5"/>
  <text x="140" y="520" font-size="12" font-weight="bold" fill="#E5E5E7" text-anchor="middle">▼ Verano</text>

  <!-- Quick actions section -->
  <text x="50" y="555" font-size="11" fill="#8E8E93">Quick actions:</text>
  <rect x="50" y="565" width="85" height="28" rx="6" fill="#3A3A3C" stroke="#3A3A3C" stroke-width="1.5"/>
  <text x="92.5" y="585" font-size="11" font-weight="bold" fill="#E5E5E7" text-anchor="middle">🌀 Flocculant</text>

  <rect x="165" y="565" width="85" height="28" rx="6" fill="#3A3A3C" stroke="#3A3A3C" stroke-width="1.5"/>
  <text x="207.5" y="585" font-size="11" font-weight="bold" fill="#E5E5E7" text-anchor="middle">🧪 Treatment</text>

  <!-- Status indicator -->
  <circle cx="280" cy="577" r="5" fill="#34C759"/>
  <text x="295" y="583" font-size="12" fill="#34C759">Pump: ON</text>
</svg>