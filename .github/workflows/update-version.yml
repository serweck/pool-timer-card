name: Update version in hacs.json

on:
  push:
    tags:
      - 'v*'

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update hacs.json
        run: |
          python3 - <<EOF
          import json
          with open('hacs.json', 'r') as f:
            data = json.load(f)
          data['version'] = '${{ steps.version.outputs.version }}'
          with open('hacs.json', 'w') as f:
            json.dump(data, f, indent=2)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hacs.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update version to ${{ steps.version.outputs.version }}"
            git push
          fi
