blueprint:
  name: TEST - Pool logic 2 (single scope)
  description: >
    Same diagnostic but all logic is computed inside ONE template using {% set %},
    referencing only the 4 plain !input variables (no cross-referencing computed
    variables). If this notification appears, the cross-referencing variables block
    was the culprit and the real blueprint must be rewritten the same way.
  domain: automation
  source_url: https://github.com/serweck/pool-timer-card/blob/main/blueprints/_test_logic2.yaml
  input:
    pump_switch:
      name: Pump switch
      selector:
        entity:
          filter:
            - domain: switch
    schedule_helper:
      name: Schedule helper
      selector:
        entity:
          filter:
            - domain: input_text
    mode_helper:
      name: Mode helper
      selector:
        entity:
          filter:
            - domain: input_select
    state_helper:
      name: State helper
      selector:
        entity:
          filter:
            - domain: input_text

mode: restart

trigger:
  - platform: time_pattern
    minutes: /1

variables:
  pump: !input pump_switch
  sched_e: !input schedule_helper
  mode_e: !input mode_helper
  state_e: !input state_helper

action:
  - service: persistent_notification.create
    data:
      notification_id: pool_logic_test2
      title: Pool logic 2
      message: >
        {% set raw = states(state_e) %}
        {% set st = raw | from_json if raw.startswith('{') else {} %}
        {% set act = st.action if 'action' in st else none %}
        {% set until = st.until | int(0) %}
        {% set after = st.after if 'after' in st else 'Auto' %}
        {% set mode = states(mode_e) %}
        {% set sched = states(sched_e) %}
        {% set idx = now().hour * 2 + (1 if now().minute >= 30 else 0) %}
        {% set now_ms = (now().timestamp() * 1000) | int %}
        {% set running = (act is number) and (now_ms < until) %}
        {% set expired = (act is number) and (now_ms >= until) %}
        {% set settling = (act == 'settling') or (expired and after == 'OFF') %}
        {% set desired = 'on' if running else ('off' if settling else ('on' if mode == 'Perm' else ('off' if mode == 'OFF' else ('on' if (sched | length == 48 and sched[idx] == '1') else 'off')))) %}
        OK {{ now().strftime('%H:%M:%S') }} | desired={{ desired }} | mode={{ mode }} | act={{ act }} | sched_len={{ sched | length }} | idx={{ idx }} | pump={{ states(pump) }}
